    <style>
        * { transition: none !important; animation: none !important; }
        *:hover, *:active, *:focus { transform: none !important; }
        :root { --ys-bg: #F7F5F0; --ys-surface: #FFFDF8; --ys-ink: #191B18; --ys-muted: #77756D; --ys-line: #E8E3DA; --ys-accent: #7A8F73; }
        .theme-scope { --brand-accent: #7A8F73; --brand-accent-dark: #1F2A24; --brand-accent-soft: rgba(122, 143, 115, 0.10); --brand-accent-softer: rgba(122, 143, 115, 0.055); --brand-accent-border: rgba(122, 143, 115, 0.22); --brand-accent-contrast: #FFFDF8; }
        .brand-text { color: var(--brand-accent) !important; }
        .brand-border { border-color: var(--brand-accent-border) !important; }
        .brand-button { background: var(--brand-accent-dark) !important; color: var(--brand-accent-contrast) !important; border: 1px solid rgba(255,255,255,.14); }
        .brand-button-soft { background: var(--brand-accent-soft) !important; color: var(--brand-accent-dark) !important; border: 1px solid var(--brand-accent-border) !important; }
        .brand-hero-shell { position: relative; overflow: hidden; isolation: isolate; }
        .brand-hero-shell::before { content: ""; position: absolute; inset: auto -12% -32% auto; width: min(42vw, 520px); height: min(42vw, 520px); background: radial-gradient(circle, var(--brand-accent-soft) 0%, transparent 68%); z-index: -1; pointer-events: none; }
        .brand-option { background: linear-gradient(90deg, var(--brand-accent-softer), transparent 42%); }
        .theme-scope .product-frame { background: linear-gradient(180deg, rgba(255,255,255,.62), var(--brand-accent-softer)); border-color: var(--brand-accent-border); }
        .theme-scope select:focus, .theme-scope input:focus, .theme-scope textarea:focus { border-color: var(--brand-accent-border) !important; box-shadow: 0 0 0 1px var(--brand-accent-border) !important; }
        body { min-height: 100vh; background: linear-gradient(180deg, rgba(255,253,248,0.92) 0%, rgba(247,245,240,1) 42%, rgba(244,241,234,1) 100%); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .glass { background: rgba(247, 245, 240, 1); border-bottom: 1px solid rgba(25, 27, 24, 0.08); }
        .premium-surface { background: rgba(255, 253, 248, 0.98) !important; border: 1px solid rgba(25, 27, 24, 0.075) !important; }
        .diffused-backdrop { background: rgba(15, 17, 15, 0.7); }
        .luxury-panel { background: rgba(255, 253, 248, 1); border: 1px solid rgba(255, 255, 255, 0.72); box-shadow: 0 40px 120px -70px rgba(0,0,0,.52); }
        .best-seller-shell { background: linear-gradient(135deg, rgba(255,253,248,1), rgba(255,253,248,.9)), radial-gradient(circle at 10% 0%, var(--brand-accent-soft), transparent 40%); border: 1px solid var(--brand-accent-border); }
        .modern-product-card, .featured-product-card { position: relative; background: rgba(255,253,248,1) !important; border: 1px solid rgba(25,27,24,.075) !important; }
        .modern-product-frame, .featured-product-frame { background: radial-gradient(circle at 50% 18%, rgba(255,255,255,.82), transparent 46%), linear-gradient(180deg, rgba(255,255,255,.72), var(--brand-accent-softer)); border: 1px solid var(--brand-accent-border); }

        .add-pill { background: var(--brand-accent-dark); color: var(--brand-accent-contrast); border: 1px solid rgba(255,255,255,.14); }
        .quick-plus { background: rgba(255,253,248,1); color: var(--brand-accent-dark); border: 1px solid var(--brand-accent-border); }
        .category-rail { background: rgba(247,245,240,1) !important; border-bottom: 1px solid rgba(25,27,24,.06); }

        @media (max-width: 640px) {

            .brand-category-pill { padding: .58rem .95rem !important; font-size: 10px !important; letter-spacing: .11em !important; white-space: nowrap; }

<body class="bg-background text-foreground antialiased selection:bg-primary selection:text-white pb-28 md:pb-32">

    <div id="app"></div>

    <script src="data.js"></script>

    <script>
        let savedCart = localStorage.getItem('yasif_cart');
        let parsedCart = savedCart ? JSON.parse(savedCart) : [];
        parsedCart = parsedCart.filter(item => item.brand !== 'Fore Coffee');

        let state = {
            showDisclaimer: true,
            showKKDisclaimer: false,
            hasSeenKKPopup: false,
            selectedBrand: null,
            cart: parsedCart,
            showCart: false,
            showTutorial: false,
            storeLocation: '',
            activeProduct: null, 
            tempNote: '',
            tempQty: 1,
            tempSize: null,
            tempSugar: null,
            orderType: 'now',
            scheduledTime: '',
            searchQuery: ''
        };

        function saveCart() { localStorage.setItem('yasif_cart', JSON.stringify(state.cart)); }

        window.safeBack = function() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.hash = state.selectedBrand ? 'brand-' + encodeURIComponent(state.selectedBrand) : '';
            }
        };

        const formatPrice = (price) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(price || 0);
        const getTotalItems = () => state.cart.reduce((sum, item) => sum + (item.quantity || 0), 0);
        const getTotalPrice = () => state.cart.reduce((sum, item) => sum + ((item.promoPrice || 0) * (item.quantity || 0)), 0);
        const escapeHtml = (value) => String(value || '').replace(/[&<>"']/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));

        function renderPickupStoreField(inputIcon, inputLabel) {
            return `
                <div class="premium-surface p-5 rounded-[1.5rem] mt-3">
                    <label class="block text-[10px] uppercase tracking-[0.24em] text-subtle font-semibold mb-3 flex items-center gap-2">
                        ${inputIcon} ${inputLabel} <span class="text-[#9E3C3C]">*</span>
                    </label>
                    <p class="mb-4 text-[11px] sm:text-xs leading-relaxed font-semibold text-subtle">Ketik nama cabang/lokasi pengambilan pesanan.</p>
                    <input type="text" value="${escapeHtml(state.storeLocation)}" oninput="state.storeLocation = this.value" placeholder="Contoh: Cabang Grand Indonesia..." class="w-full bg-surface border border-border px-5 py-4 rounded-[1.25rem] text-sm focus:outline-none focus:border-primary/40 focus:ring-1 focus:ring-primary/20 font-medium placeholder:text-subtle/45" />
                </div>
            `;
        }

        const BRAND_THEMES = {
            'Kopi Kenangan': { accent: '#B43A34', dark: '#4A1E1B', soft: 'rgba(180, 58, 52, 0.105)', softer: 'rgba(180, 58, 52, 0.055)', border: 'rgba(180, 58, 52, 0.22)', label: 'Best Seller' },
            'Tomoro Coffee': { accent: '#D8732A', dark: '#633416', soft: 'rgba(216, 115, 42, 0.115)', softer: 'rgba(216, 115, 42, 0.06)', border: 'rgba(216, 115, 42, 0.24)', label: 'See You Tomoro' },
            default: { accent: '#7A8F73', dark: '#1F2A24', soft: 'rgba(122, 143, 115, 0.10)', softer: 'rgba(122, 143, 115, 0.055)', border: 'rgba(122, 143, 115, 0.22)', label: 'yasif neutral' }
        };

        const getBrandTheme = (brand) => BRAND_THEMES[brand] || BRAND_THEMES.default;
        const getThemeBrand = () => state.selectedBrand || (state.cart[0] ? state.cart[0].brand : null);
        const getBrandThemeStyle = (brand) => { const t = getBrandTheme(brand); return `--brand-accent:${t.accent};--brand-accent-dark:${t.dark};--brand-accent-soft:${t.soft};--brand-accent-softer:${t.softer};--brand-accent-border:${t.border};--brand-accent-contrast:#FFFDF8;`; };

        const BEST_SELLER_PRODUCTS = {
    'Kopi Kenangan': [
        { id: 'kk-16', name: 'Kopi Kenangan Mantan' }, 
        { id: 'kk-12', name: 'Creamy Aren Latte' }
    ],
    'Tomoro Coffee': [
        { id: '106', name: 'Matcha Oat Latte' }, 
        { id: '121', name: 'TOMORO Aren Latte' }
    ]
};
        const normalizeText = (value) => String(value || '').toLowerCase().replace(/\s+/g, ' ').trim();

        const getBestSellerProducts = (brand) => {
            const targets = BEST_SELLER_PRODUCTS[brand] || [];
            const selected = targets.map(target => window.products.find(p => {
                const productName = normalizeText(p.name);
                const targetName = normalizeText(target.name);
                return (p.brand === brand && (p.id === target.id || productName === targetName || productName.startsWith(targetName)));
            })).filter(Boolean);

            const fallback = window.products.filter(p => p.brand === brand && !selected.some(s => s.id === p.id)).slice(0, Math.max(0, 2 - selected.length));
            return [...selected, ...fallback].slice(0, 2);
        };

        const renderProductTile = (product, options = {}) => {
            const isFeatured = Boolean(options.featured);
            const rankLabel = options.rank ? `Top ${String(options.rank).padStart(2, '0')}` : product.category;
            const safeImage = product.image || 'https://placehold.co/600x750/F7F5F0/77756D?text=No+Image';
            const displayPromo = product.promoPrice || product.originalPrice;
            const displayName = product.name;

            const qtyInCart = state.cart.filter(i => i.id === product.id || i.id.startsWith(product.id + '-')).reduce((sum, item) => sum + (item.quantity || 0), 0);
            const cartBadgeHtml = qtyInCart > 0 ? `<div class="absolute top-2 right-2 z-20 bg-primary text-white text-[9px] font-bold px-2 py-1 rounded-full shadow-md">🛒 ${qtyInCart}x</div>` : '';

            if (isFeatured) {
                return `
                    <article class="product-card featured-product-card group cursor-pointer rounded-[1.75rem] sm:rounded-[2.1rem] p-3 sm:p-4 overflow-hidden" onclick="window.location.hash = 'product-${product.id}'">
                        <div class="grid grid-cols-[96px_1fr] sm:grid-cols-[150px_1fr] gap-3 sm:gap-5 items-center">
                            <div class="featured-product-frame aspect-square rounded-[1.2rem] sm:rounded-[1.75rem] overflow-hidden relative p-2.5 sm:p-4">
                                ${cartBadgeHtml}
                                <img src="${safeImage}" alt="${product.name}" class="w-full h-full object-contain" loading="lazy" decoding="async" onerror="this.src='https://placehold.co/600x600/F7F5F0/77756D?text=No+Image'"/>
                            </div>
                            <div class="min-w-0 pr-0 sm:pr-1">
                                <div class="flex items-center justify-between gap-2 mb-1.5">
                                    <p class="text-[9px] sm:text-[10px] uppercase tracking-[0.2em] brand-text font-bold">Best Seller</p>
                                    <span class="product-badge shrink-0 rounded-full px-2.5 sm:px-3 py-1 sm:py-1.5 text-[8px] sm:text-[10px] uppercase tracking-[0.14em] sm:tracking-[0.18em] font-bold">${rankLabel}</span>
                                </div>
                                <h4 class="font-heading font-semibold text-[17px] sm:text-2xl text-foreground leading-[1.02] tracking-[-0.052em] line-clamp-2">${displayName}</h4>
                                <p class="mt-1.5 text-[11px] sm:text-xs text-subtle line-clamp-1">${product.category}</p>
                                <div class="mt-3 flex items-end justify-between gap-2">
                                    <div class="flex flex-col gap-0.5 min-w-0">
                                        <span class="text-[10px] sm:text-[11px] text-subtle line-through decoration-foreground/30">${formatPrice(product.originalPrice)}</span>
                                        <span class="text-[17px] sm:text-xl font-bold text-foreground tracking-[-0.045em]">${formatPrice(displayPromo)}</span>
                                    </div>
                                    <span class="add-pill shrink-0 rounded-full px-3 sm:px-4 py-2 sm:py-2.5 text-[9px] sm:text-[11px] uppercase tracking-[0.12em] sm:tracking-[0.14em] font-bold inline-flex items-center gap-1.5 sm:gap-2">
                                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v14m7-7H5"></path></svg>
                                        Tambah
                                    </span>
                                </div>
                            </div>
                        </div>
                    </article>
                `;
            }

            return `
                <article class="product-card modern-product-card flex flex-col h-full group cursor-pointer rounded-[1.45rem] sm:rounded-[1.85rem] overflow-hidden" onclick="window.location.hash = 'product-${product.id}'">
                    <div class="p-2 sm:p-3 pb-0 shrink-0">
                        <div class="modern-product-frame aspect-square rounded-[1.15rem] sm:rounded-[1.55rem] overflow-hidden relative p-2.5 sm:p-4">
                            ${cartBadgeHtml}
                            <img src="${safeImage}" alt="${product.name}" class="w-full h-full object-contain" loading="lazy" decoding="async" onerror="this.src='https://placehold.co/600x750/F7F5F0/77756D?text=No+Image'"/>
                            <div class="absolute top-2 left-2 z-10 product-badge rounded-full px-2 py-0.5 text-[8px] sm:text-[9px] uppercase tracking-[0.11em] sm:tracking-[0.14em] font-bold max-w-[calc(100%-1rem)] truncate">${product.category}</div>
                            <div class="absolute right-2 bottom-2 z-10 quick-plus w-8 h-8 sm:w-9 sm:h-9 rounded-full flex items-center justify-center">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M12 5v14m7-7H5"></path></svg>
                            </div>
                        </div>
                    </div>
                    <div class="p-3 sm:p-4 flex flex-col flex-1">
                        <h4 class="font-heading font-semibold text-[15px] sm:text-lg text-foreground leading-tight tracking-[-0.04em] line-clamp-2">${product.name}</h4>
                        <div class="mt-auto pt-2 sm:pt-2.5 flex flex-col gap-0.5">
                            <span class="text-[10px] sm:text-[11px] text-subtle line-through decoration-foreground/30">${formatPrice(product.originalPrice)}</span>
                            <span class="text-[18px] sm:text-lg font-bold text-foreground tracking-[-0.04em]">${formatPrice(displayPromo)}</span>
                        </div>
                    </div>
                </article>
            `;
        };

        function updateTempNote(value) { state.tempNote = value; }

        function confirmAddToCart() {
            if (!state.activeProduct) return;
            
            if (state.cart.length > 0) {
                const currentBrand = state.cart[0].brand; 
                const newBrand = state.activeProduct.brand; 
                if (currentBrand !== newBrand) {
                    showToast(`Keranjang berisi ${currentBrand}.<br>Checkout atau Hapus dulu ya!`, 'error');
                    return; 
                }
            }

            let finalPrice = state.activeProduct.promoPrice;
            let finalName = state.activeProduct.name;
            let finalNote = state.tempNote;
            let finalSize = state.tempSize;
            let finalSugar = state.tempSugar;

            if (state.activeProduct.sizes && state.tempSize) {
                const selectedSize = state.activeProduct.sizes.find(s => s.name === state.tempSize);
                if (selectedSize && selectedSize.promoPrice) finalPrice = selectedSize.promoPrice;
            }

            const baseId = state.activeProduct.id;
            const uniqueId = `${baseId}${finalSize ? '-'+finalSize : ''}${finalSugar ? '-'+finalSugar : ''}`;
            const finalQty = state.tempQty || 1;
            
            const existingItem = state.cart.find(item => item.id === uniqueId && item.note === finalNote);
            
            if (existingItem) {
                existingItem.quantity += finalQty;
            } else {
                state.cart.push({ 
                    ...state.activeProduct,
                    cartItemId: Date.now().toString(36) + Math.random().toString(36).substr(2),
                    id: uniqueId,
                    name: finalName,
                    promoPrice: finalPrice,
                    quantity: finalQty,
                    note: finalNote,
                    size: finalSize,
                    sugar: finalSugar
                });
            }

            saveCart();
            render(); 
            showToast('Berhasil masuk keranjang! 🛒');
            safeBack();
        }

        function updateCartQty(cartItemId, delta) {
            const item = state.cart.find(i => i.cartItemId === cartItemId);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) state.cart = state.cart.filter(i => i.cartItemId !== cartItemId);
                saveCart();
                render();
            }
        }

        function removeFromCart(cartItemId) {
            state.cart = state.cart.filter(i => i.cartItemId !== cartItemId);
            saveCart();
            render();
        }

        function handleWhatsAppOrder() {
            const pickupStore = (state.storeLocation || '').trim();
            if (!pickupStore) { showToast('Isi lokasi pengambilan dulu!', 'error'); return; }
            const orderBrand = state.cart.length > 0 ? state.cart[0].brand : 'Pesanan';

            if (orderBrand === 'Kopi Kenangan' && getTotalItems() < 2) {
                showToast('Minimal pembelian Kopi Kenangan adalah 2 item.', 'error');
                return;
            }
            if (state.orderType === 'scheduled' && !state.scheduledTime) {
                showToast('Jam pengambilan belum diisi!', 'error');
                return;
            }

            let message = `*Orderan Baru: ${orderBrand}*\n--------------------------------\n`;
            state.cart.forEach(item => {
                message += `• ${item.name} (${item.quantity}x)\n`;
                if (item.size) message += `   Ukuran: ${item.size}\n`;
                if (item.sugar) message += `   Gula: ${item.sugar}\n`;
                if (item.note && item.note.trim() !== '') message += `   Note: ${item.note}\n`;
                message += `   Harga: ${formatPrice(item.promoPrice * item.quantity)}\n`;
            });
            message += `\n*Total: ${formatPrice(getTotalPrice())}*\n--------------------------------\n`;
            message += `*Lokasi Ambil:* ${pickupStore}\n`;
            message += `*Waktu Ambil:* ${state.orderType === 'now' ? 'SEKARANG⚡' : `JAM ${state.scheduledTime}`}`;

            localStorage.removeItem('yasif_cart');
            state.cart = [];
            render();

            const whatsappUrl = `https://wa.me/6287836345807?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');
            safeBack();
        }

        function showToast(message, type = 'success') {
            const existingToast = document.getElementById('active-toast');
            if (existingToast) existingToast.remove();
            const toastContainer = document.createElement('div');
            toastContainer.id = 'active-toast';
            toastContainer.className = 'fixed inset-0 z-[100] flex items-center justify-center px-6 pointer-events-none'; 
            const theme = getBrandTheme(state.activeProduct?.brand || state.selectedBrand || (state.cart[0] ? state.cart[0].brand : null));
            const bg = type === 'error' ? '#2B1717' : theme.dark;
            const toastContent = document.createElement('div');
            toastContent.className = `text-white px-6 py-5 rounded-[1.75rem] shadow-float flex flex-col items-center justify-center gap-3 text-center w-full max-w-[320px] pointer-events-auto border border-white/10`;
            toastContent.style.background = bg;
            const icon = type === 'error' ? `<div class="bg-white/10 rounded-full p-3 mb-1"><svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></div>` : `<div class="bg-white/12 rounded-full p-3 mb-1"><svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg></div>`;
            toastContent.innerHTML = `${icon} <span class="font-semibold text-sm leading-relaxed tracking-[-0.01em]">${message}</span>`;
            toastContainer.appendChild(toastContent);
            document.body.appendChild(toastContainer);
            setTimeout(() => {
                toastContainer.remove();
            }, 2500);
        }

        function renderDisclaimerModal() {
            return `
                <div class="fixed inset-0 z-[100] flex items-center justify-center p-4">
                    <div class="absolute inset-0 diffused-backdrop"></div>
                    <div class="luxury-panel w-full max-w-[420px] rounded-[2rem] z-10 overflow-hidden flex flex-col relative">
                        <div class="px-6 py-7 text-left">
                            <div class="flex items-center justify-between mb-6">
                                <span class="text-[10px] uppercase tracking-[0.28em] text-subtle font-semibold">Yasif Notice</span>
                                <span class="w-9 h-9 rounded-full border border-border flex items-center justify-center text-lg">⏳</span>
                            </div>
                            <h3 class="font-heading font-semibold text-2xl text-foreground mb-3 tracking-[-0.03em]">Info Pesanan & Promo</h3>
                            <div class="text-sm text-subtle leading-relaxed mb-6 space-y-2">
                                <p>Halo! 👋 Waktu proses pesanan sekitar <strong class="text-foreground font-semibold">10-15 menit</strong> Mohon tunggu sampai Admin Merespon Pesanan.</p>
                                <p>Pantau terus update promo terbaru dengan join Grup WA Yasif Store!</p>
                            </div>
                            <div class="flex gap-3">
                                <a href="https://chat.whatsapp.com/Bk73XNM1R3D5p8ZdMlna1W" target="_blank" class="flex-1 py-3.5 brand-button-soft rounded-full font-semibold text-sm tracking-[-0.01em] text-center flex items-center justify-center gap-1.5"><span>💬</span> Join Grup</a>
                                <button onclick="state.showDisclaimer=false; render()" class="flex-1 py-3.5 brand-button rounded-full font-semibold text-sm tracking-[-0.01em]">Lanjut Pesan</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderKKDisclaimerModal() {
            return `
                <div class="fixed inset-0 z-[100] flex items-center justify-center p-4">
                    <div class="absolute inset-0 diffused-backdrop"></div>
                    <div class="luxury-panel w-full max-w-[400px] rounded-[2rem] z-10 overflow-hidden flex flex-col relative">
                        <div class="px-6 py-7 text-center">

                                                    <p class="text-sm font-semibold text-foreground tracking-[-0.02em]">${formatPrice(item.promoPrice)}</p>
                                                    <div class="flex items-center gap-3 bg-background border border-border rounded-full p-1">
                                                        <button onclick="updateCartQty('${item.cartItemId}', -1)" class="w-6 h-6 rounded-full bg-surface text-foreground font-bold flex items-center justify-center">-</button>
                                                        <span class="text-xs font-bold w-4 text-center text-foreground">${item.quantity}</span>
                                                        <button onclick="updateCartQty('${item.cartItemId}', 1)" class="w-6 h-6 rounded-full text-foreground bg-surface border border-border font-bold flex items-center justify-center">+</button>
                                                    </div>
                                                </div>
                                            </div>
                                            <button onclick="removeFromCart('${item.cartItemId}')" class="absolute top-4 right-4 text-subtle/45 p-1"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                                        </div>
                                    `).join('')}
                                </div>
                                <div class="premium-surface p-5 rounded-[1.5rem] mt-6">
                                    <label class="block text-[10px] uppercase tracking-[0.24em] text-subtle font-semibold mb-4 flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> Waktu Pengambilan</label>
                                    <div class="flex gap-2 mb-4 rounded-full bg-background/70 border border-border p-1">
                                        <button onclick="state.orderType='now'; render()" class="flex-1 py-3 rounded-full text-sm font-semibold ${state.orderType === 'now' ? 'brand-button' : 'text-subtle'}">Sekarang</button>
                                        <button onclick="state.orderType='scheduled'; render()" class="flex-1 py-3 rounded-full text-sm font-semibold ${state.orderType === 'scheduled' ? 'brand-button' : 'text-subtle'}">Jadwalkan</button>
                                    </div>
                                    ${state.orderType === 'scheduled' ? `
                                        <div>
                                            <input type="time" value="${state.scheduledTime}" oninput="state.scheduledTime = this.value" class="w-full bg-surface border border-border px-5 py-4 rounded-[1.25rem] text-sm font-semibold focus:outline-none focus:border-primary/40 focus:ring-1 focus:ring-primary/20 text-foreground" />
                                            <p class="text-[11px] text-subtle mt-2">Masukkan jam berapa pesanan ingin diambil.</p>
                                        </div>
                                    ` : ''}
                                </div>
                                ${renderPickupStoreField(inputIcon, inputLabel)}
                            `}
                        </div>
                        ${state.cart.length > 0 ? `
                            <div class="px-6 sm:px-8 py-6 bg-surface/86 border-t border-border/70 shrink-0">
                                <div class="flex items-center justify-between mb-5"><span class="text-[11px] uppercase tracking-[0.2em] text-subtle font-semibold">Total Pembayaran</span><span class="text-3xl font-heading font-semibold text-foreground tracking-[-0.06em]">${formatPrice(getTotalPrice())}</span></div>
                                <button onclick="handleWhatsAppOrder()" class="w-full brand-button py-4 rounded-full font-semibold text-base flex items-center justify-center gap-3"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.846 0 01-1.353-5.033c0-5.42 4.409-9.85 9.85-9.85 2.632 0 5.108 1.025 6.969 2.887 1.861 1.862 2.887 4.337 2.887 6.968.001 5.423-4.41 9.85-9.853 9.85"/></svg> Checkout WhatsApp</button>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        function renderTutorialModal() {
            const steps = [
                { icon: "01", title: "Pilih Menu", desc: "Pilih menu favoritmu, lalu masukkan ke keranjang. Harga sudah final termasuk biaya admin." },
                { icon: "02", title: "Checkout WA", desc: "Isi lokasi store pengambilan, kemudian kirim list pesanan ke WhatsApp Admin." },
                { icon: "03", title: "Pembayaran", desc: "Lakukan pembayaran sesuai instruksi Admin di WhatsApp." },
                { icon: "04", title: "Ambil Pesanan", desc: "Datang ke store dan tunjukkan bukti pemesanan dari Admin. Selesai." }
            ];
            return `
                <div class="fixed inset-0 z-50 flex items-center justify-center p-4">
                    <div class="absolute inset-0 diffused-backdrop" onclick="safeBack()"></div>
                    <div class="luxury-panel w-full max-w-[440px] rounded-[2rem] z-10 overflow-hidden flex flex-col max-h-[86vh]">
                        <div class="px-7 py-7 border-b border-border/70 bg-surface/70 flex justify-between items-start">
                            <div><p class="text-[10px] uppercase tracking-[0.24em] brand-text font-semibold mb-2">Guide</p><h3 class="font-heading font-semibold text-3xl text-foreground tracking-[-0.055em]">Cara Pemesanan</h3></div>
                            <button onclick="safeBack()" class="w-10 h-10 rounded-full border border-border flex items-center justify-center text-subtle">✕</button>
                        </div>
                        <div class="p-7 overflow-y-auto space-y-7">
                            ${steps.map((step, idx) => `
                                <div class="flex gap-5">
                                    <div class="flex flex-col items-center"><div class="w-10 h-10 rounded-full brand-button flex items-center justify-center text-[10px] tracking-[0.14em] font-semibold shrink-0">${step.icon}</div>${idx !== steps.length - 1 ? `<div class="w-px h-full bg-border my-3"></div>` : ''}</div>
                                    <div class="pb-2"><h4 class="font-heading font-semibold text-foreground text-lg tracking-[-0.035em] mb-1">${step.title}</h4><p class="text-sm text-subtle leading-relaxed">${step.desc}</p></div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="p-5 bg-surface/80 border-t border-border/70">
                            <button onclick="safeBack()" class="w-full py-4 brand-button rounded-full font-semibold">Mengerti, Yuk Pesan</button>
                        </div>
                    </div>
                </div>
            `;
        }

        window.handleHashChange = function() {
            const hash = window.location.hash;
            const prevProduct = state.activeProduct;
            
            state.activeProduct = null;
            state.showCart = false;
            state.showTutorial = false;

            if (hash.startsWith('#product-')) {
                const id = hash.replace('#product-', '');
                const product = window.products.find(p => p.id === id);
                if (product) {
                    if (!prevProduct || prevProduct.id !== id) {
                        state.tempNote = '';
                        state.tempQty = 1;
                        state.tempSize = product.sizes && product.sizes.length > 0 ? product.sizes[0].name : null;
                        state.tempSugar = product.defaultSugar || null;
                    }
                    state.activeProduct = product;
                    
                    if (!state.selectedBrand) {
                        state.selectedBrand = product.brand;
                    }
                } else {
                    safeBack();
                    return; 
                }
            } 
            else if (hash === '#cart') {
                state.showCart = true;
            } 
            else if (hash === '#tutorial') {
                state.showTutorial = true;
            } 
            else if (hash.startsWith('#brand-')) {
                const brand = decodeURIComponent(hash.replace('#brand-', ''));
                state.selectedBrand = brand;
                state.searchQuery = ''; 
                
                if (brand === 'Kopi Kenangan' && !state.hasSeenKKPopup) {
                    state.showKKDisclaimer = true;
                    state.hasSeenKKPopup = true;
                }
            } 
            else {
                state.selectedBrand = null;
                state.searchQuery = '';
            }
            
            render();
            
            if (hash === '' || hash.startsWith('#brand-')) {
                 window.scrollTo(0,0);
            }
        };

        window.addEventListener('hashchange', handleHashChange);
        handleHashChange(); 
    </script>
</body>
</html>
