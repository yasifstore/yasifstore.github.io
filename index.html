        function openProductPopup(productId) {

        function confirmAddToCart() {
            if (!state.activeProduct) return;
            
            if (state.cart.length > 0) {
                const currentBrand = state.cart[0].brand; 
                const newBrand = state.activeProduct.brand; 
                if (currentBrand !== newBrand) {
                    showToast(`Keranjang berisi ${currentBrand}.<br>Checkout atau Hapus dulu ya!`, 'error');
                    return; 
                }
            }

            let finalPrice = state.activeProduct.promoPrice;
            let finalName = state.activeProduct.name;
            let finalNote = state.tempNote;
            let finalSize = state.tempSize;
            let finalSugar = state.tempSugar;

            if (state.activeProduct.sizes && state.tempSize) {
                const selectedSize = state.activeProduct.sizes.find(s => s.name === state.tempSize);
                if (selectedSize && selectedSize.promoPrice) finalPrice = selectedSize.promoPrice;
            }

            const baseId = state.activeProduct.id;
            const uniqueId = `${baseId}${finalSize ? '-'+finalSize : ''}${finalSugar ? '-'+finalSugar : ''}`;
            const finalQty = state.tempQty || 1;
            
            const existingItem = state.cart.find(item => item.id === uniqueId && item.note === finalNote);
            
            if (existingItem) {
                existingItem.quantity += finalQty;
            } else {
                state.cart.push({ 
                    ...state.activeProduct,
                    cartItemId: Date.now().toString(36) + Math.random().toString(36).substr(2),
                    id: uniqueId,
                    name: finalName,
                    promoPrice: finalPrice,
                    quantity: finalQty,
                    note: finalNote,
                    size: finalSize,
                    sugar: finalSugar
                });
            }

            saveCart();
            state.activeProduct = null;
            render(); 
            showToast('Berhasil masuk keranjang! 🛒');
        }

        function updateCartQty(cartItemId, delta) {
            const item = state.cart.find(i => i.cartItemId === cartItemId);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) state.cart = state.cart.filter(i => i.cartItemId !== cartItemId);
                saveCart();
                render();
            }
        }

        function handleWhatsAppOrder() {
            const pickupStore = (state.storeLocation || '').trim();
            if (!pickupStore) { showToast('Isi lokasi pengambilan dulu!', 'error'); return; }
            const orderBrand = state.cart.length > 0 ? state.cart[0].brand : 'Pesanan';

            if (orderBrand === 'Kopi Kenangan' && getTotalItems() < 2) {
                showToast('Minimal pembelian Kopi Kenangan adalah 2 item.', 'error');
                return;
            }
            if (state.orderType === 'scheduled' && !state.scheduledTime) {
                showToast('Jam pengambilan belum diisi!', 'error');
                return;
            }

            let message = `*Orderan Baru: ${orderBrand}*\n--------------------------------\n`;
            state.cart.forEach(item => {
                message += `• ${item.name} (${item.quantity}x)\n`;
                if (item.size) message += `   Ukuran: ${item.size}\n`;
                if (item.sugar) message += `   Gula: ${item.sugar}\n`;
                if (item.note && item.note.trim() !== '') message += `   Note: ${item.note}\n`;
                message += `   Harga: ${formatPrice(item.promoPrice * item.quantity)}\n`;
            });
            message += `\n*Total: ${formatPrice(getTotalPrice())}*\n--------------------------------\n`;
            message += `*Lokasi Ambil:* ${pickupStore}\n`;
            message += `*Waktu Ambil:* ${state.orderType === 'now' ? 'SEKARANG⚡' : `JAM ${state.scheduledTime}`}`;

            localStorage.removeItem('yasif_cart');
            state.cart = [];

            const whatsappUrl = `https://wa.me/6287836345807?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');
            closeCartModal();

            const toastContainer = document.createElement('div');
            toastContainer.id = 'active-toast';
            toastContainer.className = 'fixed inset-0 z-[100] flex items-center justify-center px-6 pointer-events-none'; 
            const theme = getBrandTheme(state.activeProduct?.brand || state.selectedBrand || (state.cart[0] ? state.cart[0].brand : null));
            const bg = type === 'error' ? '#2B1717' : theme.dark;
            const toastContent = document.createElement('div');
            toastContent.className = `text-white px-6 py-5 rounded-[1.75rem] shadow-float flex flex-col items-center justify-center gap-3 text-center w-full max-w-[320px] animate-modal pointer-events-auto border border-white/10`;
            toastContent.style.background = bg;
            const icon = type === 'error' ? `<div class="bg-white/10 rounded-full p-3 mb-1"><svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></div>` : `<div class="bg-white/12 rounded-full p-3 mb-1"><svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg></div>`;
            toastContent.innerHTML = `${icon} <span class="font-semibold text-sm leading-relaxed tracking-[-0.01em]">${message}</span>`;
            toastContainer.appendChild(toastContent);
            document.body.appendChild(toastContainer);
            setTimeout(() => {

                                <button onclick="handleWhatsAppOrder()" class="w-full brand-button py-4 rounded-full font-semibold text-base transition-all duration-300 active:scale-[0.99] flex items-center justify-center gap-3"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.846 0 01-1.353-5.033c0-5.42 4.409-9.85 9.85-9.85 2.632 0 5.108 1.025 6.969 2.887 1.861 1.862 2.887 4.337 2.887 6.968.001 5.423-4.41 9.85-9.853 9.85"/></svg> Checkout WhatsApp</button>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        function renderTutorialModal() {
            const steps = [
                { icon: "01", title: "Pilih Menu", desc: "Pilih menu favoritmu, lalu masukkan ke keranjang. Harga sudah final termasuk biaya admin." },
                { icon: "02", title: "Checkout WA", desc: "Isi lokasi store pengambilan, kemudian kirim list pesanan ke WhatsApp Admin." },
                { icon: "03", title: "Pembayaran", desc: "Lakukan pembayaran sesuai instruksi Admin di WhatsApp." },
                { icon: "04", title: "Ambil Pesanan", desc: "Datang ke store dan tunjukkan bukti pemesanan dari Admin. Selesai." }
            ];
            return `
                <div class="fixed inset-0 z-50 flex items-center justify-center p-4">
                    <div class="absolute inset-0 diffused-backdrop transition-opacity" onclick="state.showTutorial=false; render()"></div>
                    <div class="luxury-panel w-full max-w-[440px] rounded-[2rem] z-10 overflow-hidden animate-modal flex flex-col max-h-[86vh]">
                        <div class="px-7 py-7 border-b border-border/70 bg-surface/70 flex justify-between items-start">
                            <div><p class="text-[10px] uppercase tracking-[0.24em] brand-text font-semibold mb-2">Guide</p><h3 class="font-heading font-semibold text-3xl text-foreground tracking-[-0.055em]">Cara Pemesanan</h3></div>
                            <button onclick="state.showTutorial=false; render()" class="w-10 h-10 rounded-full border border-border flex items-center justify-center text-subtle hover:text-foreground hover:border-foreground/20 transition-all duration-500">✕</button>
                        </div>
                        <div class="p-7 overflow-y-auto space-y-7">
                            ${steps.map((step, idx) => `
                                <div class="flex gap-5">
                                    <div class="flex flex-col items-center"><div class="w-10 h-10 rounded-full brand-button flex items-center justify-center text-[10px] tracking-[0.14em] font-semibold shrink-0">${step.icon}</div>${idx !== steps.length - 1 ? `<div class="w-px h-full bg-border my-3"></div>` : ''}</div>
                                    <div class="pb-2"><h4 class="font-heading font-semibold text-foreground text-lg tracking-[-0.035em] mb-1">${step.title}</h4><p class="text-sm text-subtle leading-relaxed">${step.desc}</p></div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="p-5 bg-surface/80 border-t border-border/70">
                            <button onclick="state.showTutorial=false; render()" class="w-full py-4 brand-button rounded-full font-semibold transition-all duration-300 active:scale-[0.99]">Mengerti, Yuk Pesan</button>
                        </div>
                    </div>
                </div>
            `;
        }

        let headerTicking = false;
        function syncHeaderState() {
            const header = document.getElementById('site-header');
            if (!header) return;
            header.classList.toggle('nav-scrolled', window.scrollY > 8);
        }
        window.addEventListener('scroll', () => {
            if (headerTicking) return;
            headerTicking = true;
            requestAnimationFrame(() => { syncHeaderState(); headerTicking = false; });
        }, { passive: true });

        window.selectBrand = function(brand) { 
            state.selectedBrand = brand; 
            if(brand) {
                if(brand === 'Kopi Kenangan' && !state.hasSeenKKPopup) {
                    state.showKKDisclaimer = true;
                    state.hasSeenKKPopup = true;
                }
            }
            render(); 
            window.scrollTo(0,0); 
        };
        
        render();
    </script>
</body>
</html>
