        // --- HELPERS ---
        const formatPrice = (price) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(price);
        const getTotalItems = () => state.cart.reduce((sum, item) => sum + item.quantity, 0);
        const getTotalPrice = () => state.cart.reduce((sum, item) => sum + item.promoPrice * item.quantity, 0);


        const escapeHtml = (value) => String(value || '').replace(/[&<>"']/g, char => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
        }[char]));

        const getOrderBrand = () => state.cart.length > 0 ? state.cart[0].brand : state.selectedBrand;
        const isKopiKenanganOrder = () => getOrderBrand() === 'Kopi Kenangan';

        function getSelectedKopkenStore() {
            if (!state.selectedStoreCity || !state.selectedStoreName) return null;
            const cityStores = KOPI_KENANGAN_STORES_BY_CITY[state.selectedStoreCity] || [];
            return cityStores.find(store => store.name === state.selectedStoreName) || null;
        }

        function getPickupStoreText() {
            const manualStore = (state.storeLocation || '').trim();

            if (isKopiKenanganOrder()) {
                if (state.manualStoreMode) return manualStore;
                const selectedStore = getSelectedKopkenStore();
                if (selectedStore && state.selectedStoreCity) {
                    return `${selectedStore.name}, ${state.selectedStoreCity}`;
                }
                return '';
            }

            return manualStore;
        }

        function getPickupStoreAddress() {
            if (!isKopiKenanganOrder() || state.manualStoreMode) return '';
            const selectedStore = getSelectedKopkenStore();
            return selectedStore ? selectedStore.address : '';
        }

        function sortTextList(list) {
            return [...new Set(list || [])].sort((a, b) => String(a).localeCompare(String(b), 'id', { sensitivity: 'base' }));
        }

        function sortStoreList(list) {
            return [...(list || [])].sort((a, b) => String(a.name).localeCompare(String(b.name), 'id', { sensitivity: 'base' }));
        }

        function setKopkenStoreMode(mode) {
            const useManual = mode === 'manual';
            if (state.manualStoreMode === useManual) return;

            state.manualStoreMode = useManual;
            if (useManual) {
                state.selectedStoreCity = '';
                state.selectedStoreName = '';
            } else {
                state.storeLocation = '';
            }
            render();
        }

        function updateStoreCity(city) {
            state.manualStoreMode = false;
            state.selectedStoreCity = city;
            state.selectedStoreName = '';
            state.storeLocation = '';
            render();
        }

        function updateStoreName(storeName) {
            state.manualStoreMode = false;
            state.selectedStoreName = storeName;
            state.storeLocation = '';
            render();
        }

        function updateManualStoreLocation(value) {
            state.manualStoreMode = true;
            state.storeLocation = value;
            state.selectedStoreCity = '';
            state.selectedStoreName = '';
        }

                    <div class="premium-surface p-5 rounded-[1.5rem] mt-3">

                                        <option value="">Pilih kota</option>

            if (!state.activeProduct) return;
            
            if (state.cart.length > 0) {

                const newBrand = state.activeProduct.brand; 
                
                if (currentBrand !== newBrand) {
                    showToast(`Keranjang berisi ${currentBrand}.<br>Checkout atau Hapus dulu ya!`, 'error');
                    return; 
                }
            }

            let finalPrice = state.activeProduct.promoPrice;
            let finalName = state.activeProduct.name;
            let finalNote = state.tempNote;

            // Logika Harga Custom Mix
            if (state.activeProduct.isCustom) {
                const p1 = foreDrinks.find(x => x.id === state.custom1);
                const p2 = foreDrinks.find(x => x.id === state.custom2);
                if (p1 && p2) {
                    const higherPrice = Math.max(p1.originalPrice, p2.originalPrice);
                    finalPrice = higherPrice + 6000;
                    finalName = `Mix: ${p1.name} & ${p2.name}`;
                }
            }

            // Gunakan finalName sebagai basis ID unik agar mix yang sama bisa ditumpuk
            const uniqueId = state.activeProduct.isCustom ? `mix-${state.custom1}-${state.custom2}` : state.activeProduct.id;

            const existingItem = state.cart.find(item => item.id === uniqueId && item.note === finalNote && item.promoPrice === finalPrice);
            
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                state.cart.push({ 
                    ...state.activeProduct,
                    id: uniqueId,
                    name: finalName,
                    promoPrice: finalPrice,
                    quantity: 1,
                    note: finalNote 
                });
            }

            state.activeProduct = null;
            showToast('Berhasil masuk keranjang! 🛒');

            const pickupStore = getPickupStoreText();

            const orderBrand = state.cart.length > 0 ? state.cart[0].brand : 'Pesanan';

            if (state.orderType === 'scheduled' && !state.scheduledTime) {
                showToast('Jam pengambilan belum diisi!', 'error');
                return;
            }

            let message = `*Orderan Baru: ${orderBrand}*\n`;
            message += `--------------------------------\n`;
            
            state.cart.forEach(item => {
                message += `• ${item.name} (${item.quantity}x)\n`;
                if (item.note && item.note.trim() !== '') {
                    message += `  Note: ${item.note}\n`;
                }
                message += `   Harga: ${formatPrice(item.promoPrice * item.quantity)}\n`;
            });

            message += `\n*Total: ${formatPrice(getTotalPrice())}*\n`;

            message += `*Lokasi Ambil:* ${pickupStore}\n`;
            const pickupAddress = getPickupStoreAddress();
            if (pickupAddress) {

            toastContainer.id = 'active-toast';

            const toastContent = document.createElement('div');
            const theme = getBrandTheme(state.activeProduct?.brand || state.selectedBrand || (state.cart[0] ? state.cart[0].brand : null));
            const bg = type === 'error' ? '#2B1717' : theme.dark;

            const icon = type === 'error'

                                        <div class="w-10 h-10 rounded-full brand-button flex items-center justify-center text-[10px] tracking-[0.14em] font-semibold shrink-0">
                                            ${step.icon}
                                        </div>
                                        ${idx !== steps.length - 1 ? `<div class="w-px h-full bg-border my-3"></div>` : ''}
                                    </div>
                                    <div class="pb-2">
                                        <h4 class="font-heading font-semibold text-foreground text-lg tracking-[-0.035em] mb-1">${step.title}</h4>
                                        <p class="text-sm text-subtle leading-relaxed">${step.desc}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>

                        <div class="p-5 bg-surface/80 border-t border-border/70">
                            <button onclick="state.showTutorial=false;render()" class="w-full py-4 brand-button rounded-full font-semibold transition-all duration-300 active:scale-[0.99]">
                                Mengerti, Yuk Pesan
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }


        // Lightweight nav scroll state (replaces heavy scroll-timeline blur)
        let headerTicking = false;
        function syncHeaderState() {
            const header = document.getElementById('site-header');
            if (!header) return;
            header.classList.toggle('nav-scrolled', window.scrollY > 8);
        }
        window.addEventListener('scroll', () => {
            if (headerTicking) return;
            headerTicking = true;
            requestAnimationFrame(() => {
                syncHeaderState();
                headerTicking = false;
            });
        }, { passive: true });

        // Global Handlers
        window.selectBrand = function(brand) { state.selectedBrand = brand; render(); window.scrollTo(0,0); };
        
        render(); // Start App
    // Global Handlers
        window.selectBrand = function(brand) { state.selectedBrand = brand; render(); window.scrollTo(0,0); };
        
        render(); // Start App

        // --- FITUR AUTO-CLOSE BRAND (VERSI LACAK FOTO - ANTI GAGAL) ---
        const brandYangTutup = ["Fore Coffee"]; 
        
        // Kumpulin semua link gambar menu Fore dari data 'products' kamu
        const gambarTutup = products
            .filter(p => brandYangTutup.includes(p.brand) && p.image)
            .map(p => p.image);

        function applyClosedState() {
            // 1. Matikan tombol tab/kategori Fore Coffee di navigasi atas (kalau ada)
            document.querySelectorAll('button, a, .brand-category-pill, h2, h3').forEach(el => {
                if (el.innerText && el.innerText.trim() === "Fore Coffee" && !el.classList.contains('toko-tutup')) {
                    el.classList.add('toko-tutup', 'opacity-50', 'pointer-events-none');
                    el.style.textDecoration = "line-through";
                }
            });

            // 2. Matikan Card Menu Fore Coffee
            const productCards = document.querySelectorAll('.modern-product-card, .featured-product-card, .product-card');
            
            productCards.forEach(card => {
                const img = card.querySelector('img');
                if (!img) return; // Kalau gak ada gambar, lewati
                
                // Cek apakah URL gambar di card ini ada di daftar gambar Fore
                const imgSrc = img.getAttribute('src');
                const isClosed = gambarTutup.includes(imgSrc);
                
                if (isClosed && !card.classList.contains('toko-tutup')) {
                    // Kasih class abu-abu dan matikan pointer
                    card.classList.add('toko-tutup', 'relative', 'grayscale', 'opacity-80');
                    card.style.pointerEvents = "none";
                    
                    // Bikin elemen stempel raksasa
                    const closedOverlay = document.createElement('div');
                    closedOverlay.className = 'absolute inset-0 bg-black/60 z-50 flex items-center justify-center backdrop-blur-[2px] rounded-2xl pointer-events-auto cursor-not-allowed';
                    closedOverlay.innerHTML = `
                        <div class="border-4 border-red-500 text-red-500 font-black text-2xl md:text-3xl px-4 py-2 rotate-[-15deg] uppercase tracking-widest bg-black/50 shadow-2xl whitespace-nowrap">
                            CLOSED
                        </div>
                    `;
                    
                    // Tameng ekstra biar tombol add to cart di dalamnya 100% gak bisa dipencet
                    closedOverlay.addEventListener('click', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                    }, true);

                    card.appendChild(closedOverlay);
                }
            });
        }

        // Eksekusi langsung
        setTimeout(applyClosedState, 100);

        // Satpam penjaga: Pantau pergerakan web kalau pengunjung ganti-ganti tab kategori
        const observer = new MutationObserver(() => applyClosedState());
        const appContainer = document.getElementById('app') || document.body;
        observer.observe(appContainer, { childList: true, subtree: true });
    </script>
