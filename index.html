        /* BRAND THEME SYSTEM: subtle, premium, not colorful-overload */
        .theme-scope {
            --brand-accent: #7A8F73;
            --brand-accent-dark: #1F2A24;
            --brand-accent-soft: rgba(122, 143, 115, 0.10);

            --brand-accent-contrast: #FFFDF8;
        }

        .brand-text { color: var(--brand-accent) !important; }
        .brand-border { border-color: var(--brand-accent-border) !important; }
        .brand-soft {
            background: var(--brand-accent-soft) !important;

        .brand-button {
            background: var(--brand-accent-dark) !important;

        .brand-button:hover { background: var(--brand-accent) !important; }
        .brand-button-soft {
            background: var(--brand-accent-soft) !important;
            color: var(--brand-accent-dark) !important;
            border: 1px solid var(--brand-accent-border) !important;
        }
        .brand-hero-shell {
            position: relative;
            overflow: hidden;
            isolation: isolate;
        }
        .brand-hero-shell::before {
            content: "";
            position: absolute;
            inset: auto -12% -32% auto;
            width: min(42vw, 520px);
            height: min(42vw, 520px);
            background: radial-gradient(circle, var(--brand-accent-soft) 0%, transparent 68%);
            z-index: -1;
            pointer-events: none;
        }
        .brand-category-pill:hover,
        .brand-category-pill:focus {
            color: var(--brand-accent-dark) !important;
            border-color: var(--brand-accent-border) !important;
            background: var(--brand-accent-soft) !important;
        }
        .brand-option {
            background: linear-gradient(90deg, var(--brand-accent-softer), transparent 42%);
        }
        .brand-option:hover {
            background: linear-gradient(90deg, var(--brand-accent-soft), transparent 72%);
        }
        .brand-option .brand-arrow {
            border-color: var(--brand-accent-border) !important;
            color: var(--brand-accent-dark) !important;
        }
        .brand-option:hover .brand-arrow {
            background: var(--brand-accent-dark) !important;
            color: var(--brand-accent-contrast) !important;
            border-color: var(--brand-accent-dark) !important;
        }
        .theme-scope .product-frame {
            background: linear-gradient(180deg, rgba(255,255,255,.62), var(--brand-accent-softer));
            border-color: var(--brand-accent-border);
        }
        .theme-scope select:focus,
        .theme-scope input:focus,
        .theme-scope textarea:focus {
            border-color: var(--brand-accent-border) !important;
            box-shadow: 0 0 0 1px var(--brand-accent-border) !important;
        }

        html { scroll-padding-top: 132px; }
        body {
            min-height: 100vh;
            background:
                linear-gradient(180deg, rgba(255,253,248,0.92) 0%, rgba(247,245,240,1) 42%, rgba(244,241,234,1) 100%);
        }

        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        .glass {
            background: rgba(247, 245, 240, 0);
            backdrop-filter: blur(0px);
            -webkit-backdrop-filter: blur(0px);
            border-bottom: 1px solid transparent;
            transition: background 700ms cubic-bezier(.16,1,.3,1), border-color 700ms cubic-bezier(.16,1,.3,1), backdrop-filter 700ms cubic-bezier(.16,1,.3,1);
        }

        @supports (animation-timeline: scroll()) {
            header.glass {
                animation: premiumNav linear both;
                animation-timeline: scroll(root);
                animation-range: 0 140px;
            }
        }

        @supports not (animation-timeline: scroll()) {
            .glass {
                background: rgba(247, 245, 240, 0.78);
                backdrop-filter: blur(18px);
                -webkit-backdrop-filter: blur(18px);
                border-bottom-color: rgba(25, 27, 24, 0.07);
            }
        }

        @keyframes premiumNav {
            from {
                background: rgba(247, 245, 240, 0);
                backdrop-filter: blur(0px);
                -webkit-backdrop-filter: blur(0px);
                border-bottom-color: transparent;
            }
            to {
                background: rgba(247, 245, 240, 0.84);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                border-bottom-color: rgba(25, 27, 24, 0.08);
            }
        }

        .glass-dark {
            background: rgba(25, 27, 24, 0.86);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px) scale(.992); filter: blur(4px); }
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        @keyframes modalIn {
            from { opacity: 0; transform: translateY(28px) scale(.975); filter: blur(8px); }
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        .animate-fade-up { animation: fadeUp .72s cubic-bezier(.16,1,.3,1) both; }
        .animate-modal { animation: modalIn .62s cubic-bezier(.16,1,.3,1) both; }

        .card-hover { transition: transform .7s cubic-bezier(.16,1,.3,1), border-color .7s cubic-bezier(.16,1,.3,1), background .7s cubic-bezier(.16,1,.3,1), opacity .7s cubic-bezier(.16,1,.3,1); }
        .card-hover:hover { transform: translateY(-2px); }

        .editorial-link { position: relative; }
        .editorial-link::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -2px;
            width: 100%;
            height: 1px;
            background: currentColor;
            transform: scaleX(0);
            transform-origin: right;
            transition: transform .45s cubic-bezier(.16,1,.3,1);
        }
        .editorial-link:hover::after { transform: scaleX(1); transform-origin: left; }

        .premium-surface {
            background: rgba(255, 253, 248, 0.72);

            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);

        .product-frame {
            background: linear-gradient(180deg, rgba(255,255,255,.58), rgba(238,234,225,.56));
            border: 1px solid rgba(25, 27, 24, 0.055);
        }

        .product-card:hover .product-frame img { transform: scale(1.045); }

        .diffused-backdrop {
            background:
                radial-gradient(circle at 50% 18%, rgba(255,253,248,.18), transparent 42%),
                rgba(15, 17, 15, 0.42);
            backdrop-filter: blur(26px) saturate(1.08);

        }

        .luxury-panel {
            background: rgba(255, 253, 248, 0.94);

            box-shadow: 0 40px 120px -70px rgba(0,0,0,.52);
        }

        input, textarea, select { font-size: 16px; }

        /* FINAL PERFORMANCE PATCH: premium look, lighter rendering */
        header.glass { animation: none !important; }
        .glass {
            background: rgba(247, 245, 240, 0);
            border-bottom: 1px solid transparent;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;

        }
        .glass.nav-scrolled {

            border-bottom-color: rgba(25, 27, 24, 0.08);

        .premium-surface {
            background: rgba(255, 253, 248, 0.88) !important;
            border: 1px solid rgba(25, 27, 24, 0.075) !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes modalIn {
            from { opacity: 0; transform: translateY(16px) scale(.985); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-fade-up { animation: fadeUp .36s cubic-bezier(.16,1,.3,1) both !important; }
        .animate-modal { animation: modalIn .32s cubic-bezier(.16,1,.3,1) both !important; }
        .card-hover { transition: transform .24s ease, border-color .24s ease, background-color .24s ease, opacity .24s ease !important; }
        .product-card { content-visibility: auto; contain-intrinsic-size: 420px; }
        .product-frame img { transition: transform .28s ease !important; }
        .product-card:hover .product-frame img { transform: scale(1.025) !important; }
        .diffused-backdrop {
            background: rgba(15, 17, 15, 0.38) !important;
            backdrop-filter: blur(8px) !important;
            -webkit-backdrop-filter: blur(8px) !important;
        }
        .luxury-panel { box-shadow: 0 28px 80px -50px rgba(0,0,0,.45) !important; }
        .cart-floating-pill {
            background: var(--brand-accent-dark) !important;
            border: 1px solid rgba(255, 253, 248, 0.24) !important;
            box-shadow: 0 18px 52px -28px rgba(25,27,24,.7), 0 1px 0 rgba(255,255,255,.18) inset !important;

        .cart-floating-pill__price { color: rgba(255, 253, 248, 0.68) !important; }
        .cart-floating-pill__text { color: #FFFDF8 !important; }
        .category-rail { background: rgba(247,245,240,.96) !important; backdrop-filter: none !important; -webkit-backdrop-filter: none !important; }
        @media (max-width: 768px) {
            .glass.nav-scrolled,
            .diffused-backdrop {
                backdrop-filter: none !important;
                -webkit-backdrop-filter: none !important;
            }
            .product-card { contain-intrinsic-size: 360px; }
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: .001ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
                transition-duration: .001ms !important;
            }
        }

    </style>
</head>

                                    Checkout WhatsApp

        }

        function renderTutorialModal() {
            const steps = [
                { icon: "01", title: "Pilih Menu", desc: "Pilih menu favoritmu, lalu masukkan ke keranjang. Harga sudah final termasuk biaya admin." },
                { icon: "02", title: "Checkout WA", desc: "Isi lokasi store pengambilan, kemudian kirim list pesanan ke WhatsApp Admin." },
                { icon: "03", title: "Pembayaran", desc: "Lakukan pembayaran sesuai instruksi Admin di WhatsApp." },
                { icon: "04", title: "Ambil Pesanan", desc: "Datang ke store dan tunjukkan bukti pemesanan dari Admin. Selesai." }
            ];

            return `
                <div class="fixed inset-0 z-50 flex items-center justify-center p-4">
                    <div class="absolute inset-0 diffused-backdrop transition-opacity" onclick="state.showTutorial=false;render()"></div>
                    <div class="luxury-panel w-full max-w-[440px] rounded-[2rem] z-10 overflow-hidden animate-modal flex flex-col max-h-[86vh]">
                        
                        <div class="px-7 py-7 border-b border-border/70 bg-surface/70 flex justify-between items-start">
                            <div>
                                <p class="text-[10px] uppercase tracking-[0.24em] brand-text font-semibold mb-2">Guide</p>
                                <h3 class="font-heading font-semibold text-3xl text-foreground tracking-[-0.055em]">Cara Pemesanan</h3>
                            </div>
                            <button onclick="state.showTutorial=false;render()" class="w-10 h-10 rounded-full border border-border flex items-center justify-center text-subtle hover:text-foreground hover:border-foreground/20 transition-all duration-500">✕</button>
                        </div>

                        <div class="p-7 overflow-y-auto space-y-7">
                            ${steps.map((step, idx) => `
                                <div class="flex gap-5">
                                    <div class="flex flex-col items-center">
                                        <div class="w-10 h-10 rounded-full brand-button flex items-center justify-center text-[10px] tracking-[0.14em] font-semibold shrink-0">
                                            ${step.icon}
                                        </div>
                                        ${idx !== steps.length - 1 ? `<div class="w-px h-full bg-border my-3"></div>` : ''}
                                    </div>
                                    <div class="pb-2">
                                        <h4 class="font-heading font-semibold text-foreground text-lg tracking-[-0.035em] mb-1">${step.title}</h4>
                                        <p class="text-sm text-subtle leading-relaxed">${step.desc}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>

                        <div class="p-5 bg-surface/80 border-t border-border/70">
                            <button onclick="state.showTutorial=false;render()" class="w-full py-4 brand-button rounded-full font-semibold transition-all duration-300 active:scale-[0.99]">
                                Mengerti, Yuk Pesan
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }


        // Lightweight nav scroll state (replaces heavy scroll-timeline blur)
        let headerTicking = false;
        function syncHeaderState() {
            const header = document.getElementById('site-header');
            if (!header) return;
            header.classList.toggle('nav-scrolled', window.scrollY > 8);
        }
        window.addEventListener('scroll', () => {
            if (headerTicking) return;
            headerTicking = true;
            requestAnimationFrame(() => {
                syncHeaderState();
                headerTicking = false;
            });
        }, { passive: true });

        // Global Handlers
        window.selectBrand = function(brand) { state.selectedBrand = brand; render(); window.scrollTo(0,0); };
        
        render(); // Start App
    </script>
</body>
